function status_for(kommune, plantype) {
  const key = kommune + '__' + plantype;
  if (DATA.funn[key]) return 'funnet';
  if (DATA.forsok[key]) return 'sokt';
  return 'uort';
}

function bygg_header() {
  const head = document.getElementById('matrise-head');
  head.innerHTML = '<th>Kommune</th><th>Fylke</th>' +
    DATA.plantyper.map(p => '<th title="' + p + '">' + p.replace(/_/g, '<br>') + '</th>').join('');
}

function render_matrise() {
  const tbody = document.getElementById('matrise-body');
  const fFylke = document.getElementById('filter-fylke').value;
  const fKat = document.getElementById('filter-kategori').value;
  const fStatus = document.getElementById('filter-status').value;
  let n_funnet = 0, n_sokt = 0, n_uort = 0;

  tbody.innerHTML = '';
  for (const k of DATA.kommuner) {
    if (fFylke && k.fylke !== fFylke) continue;
    const tr = document.createElement('tr');
    const navn_td = document.createElement('td');
    navn_td.className = 'kommunenavn';
    navn_td.textContent = k.navn;
    tr.appendChild(navn_td);
    const fylke_td = document.createElement('td');
    fylke_td.className = 'fylke';
    fylke_td.textContent = k.fylke;
    tr.appendChild(fylke_td);
    for (const p of DATA.plantyper) {
      if (fKat && DATA.kategorier[p] !== fKat) {
        const td = document.createElement('td');
        td.style.background = '#fafafa';
        tr.appendChild(td);
        continue;
      }
      const st = status_for(k.navn, p);
      if (fStatus && fStatus !== st) {
        const td = document.createElement('td');
        tr.appendChild(td);
        continue;
      }
      if (st === 'funnet') n_funnet++;
      else if (st === 'sokt') n_sokt++;
      else n_uort++;
      const td = document.createElement('td');
      const div = document.createElement('div');
      div.className = 'celle ' + st;
      div.textContent = st === 'funnet' ? '✓' : (st === 'sokt' ? '✗' : '·');
      div.dataset.kommune = k.navn;
      div.dataset.plantype = p;
      div.addEventListener('click', () => apne_panel(k.navn, p));
      td.appendChild(div);
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
  document.getElementById('stat-funnet').textContent = n_funnet;
  document.getElementById('stat-sokt').textContent = n_sokt;
  document.getElementById('stat-uort').textContent = n_uort;
}

function apne_panel(kommune, plantype) {
  const key = kommune + '__' + plantype;
  const f = DATA.funn[key];
  document.getElementById('panel-tittel').textContent = kommune + ' — ' + plantype;
  const innhold = document.getElementById('panel-innhold');
  if (f) {
    let url_visning = f.url || '';
    let url_lenke = '';
    if (url_visning) {
      // Bygg lenke for både eksterne (http://) og lokale (planer/...) URLer
      const visning_tekst = url_visning.startsWith('planer/')
        ? '📄 ' + decodeURIComponent(url_visning.split('/').pop())
        : url_visning;
      url_lenke = '<a href="' + url_visning + '" target="_blank" rel="noopener">' + visning_tekst + '</a>';
    } else {
      url_lenke = '<em>ingen URL</em>';
    }
    innhold.innerHTML =
      '<div class="meta-rad"><div class="meta-lbl">Tittel</div>' + (f.tittel || '<em>ingen</em>') + '</div>' +
      '<div class="meta-rad"><div class="meta-lbl">URL</div>' + url_lenke + '</div>' +
      '<div class="meta-rad"><div class="meta-lbl">Kilde</div>' + (f.kilde || '') + '</div>' +
      '<div class="meta-rad"><div class="meta-lbl">Confidence</div>' + (f.confidence || '') + '</div>' +
      '<div class="meta-rad"><div class="meta-lbl">Tegn i dokumentet</div>' + (f.tegn || 0).toLocaleString() + '</div>' +
      '<div class="meta-rad"><div class="meta-lbl">Hentet</div>' + (f.dato || '') + '</div>';
  } else if (DATA.forsok[key]) {
    innhold.innerHTML =
      '<div class="meta-rad"><div class="meta-lbl">Status</div>Søkt, men ikke funnet som offentlig dokument.</div>' +
      '<div class="meta-rad"><div class="meta-lbl">Siste forsøk</div>' + DATA.forsok[key] + '</div>';
  } else {
    innhold.innerHTML = '<div class="meta-rad">Ikke søkt ennå.</div>';
  }
  document.getElementById('panel').classList.add('aapen');
}

document.getElementById('panel-lukk').addEventListener('click', () => {
  document.getElementById('panel').classList.remove('aapen');
});
document.getElementById('filter-fylke').addEventListener('change', render_matrise);
document.getElementById('filter-kategori').addEventListener('change', render_matrise);
document.getElementById('filter-status').addEventListener('change', render_matrise);

bygg_header();
render_matrise();
</script>
